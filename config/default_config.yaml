# 沪深300价值股票量化选股系统 - 默认配置

# 数据源配置
data_source:
  primary: "akshare"
  fallback: "baostock"
  retry:
    max_attempts: 3
    interval_seconds: 5.0
  cache:
    enabled: true
    cache_dir: "output_data/cache"
    finance_expire_hours: 4
    market_expire_hours: 1

# 退市风险过滤
delisting:
  st_keywords: ["ST", "*ST"]
  min_revenue: 100000000  # 1亿元
  require_positive_net_assets: true

# 资产垫分级阈值
asset_cushion:
  t0:
    min_conservative_ratio: 0.8
    min_loose_ratio: 1.5
  t1:
    min_loose_ratio: 1.0
    require_positive_conservative: true
  t2:
    require_positive_loose: true
    min_current_asset_net_ratio: 0.5

# 经营安全阈值
operation_safety:
  require_positive_fcf: true
  max_capex_ratio: 0.5

# 兑现安全阈值
redemption_safety:
  dividend:
    min_years: 3
    min_dividend_yield: 0.02
  earnings_recovery:
    lookback_years: 3

# 综合评分权重与分值
scoring:
  weights:
    asset_cushion: 0.4
    operation_safety: 0.3
    redemption_safety: 0.3
  scores:
    t0: 100
    t1: 70
    t2: 40
    fail: 0
    operation_pass: 100
    operation_partial: 50
    operation_fail: 0
    redemption_pass: 100
    redemption_fail: 0

  continuous:
    asset_cushion:
      enabled: true
      conservative_ratio_mapping:
        func_type: "linear"
        coefficient: 1.0
        lower_bound: 0.8
        upper_bound: 2.0
        max_bonus: 10.0
        max_penalty: 0.0
      loose_ratio_mapping:
        func_type: "linear"
        coefficient: 1.0
        lower_bound: 1.0
        upper_bound: 3.0
        max_bonus: 10.0
        max_penalty: 0.0
    operation_safety:
      enabled: true
      capex_ratio_mapping:
        func_type: "linear"
        coefficient: 1.0
        lower_bound: 0.0
        upper_bound: 0.5
        max_bonus: 15.0
        max_penalty: 15.0
    redemption_safety:
      enabled: true
      dividend_yield_weight: 0.4
      dividend_years_weight: 0.3
      earnings_recovery_weight: 0.3
      dividend_yield_mapping:
        func_type: "sigmoid"
        coefficient: 2.0
        lower_bound: 0.02
        upper_bound: 0.08
        max_bonus: 20.0
        max_penalty: 0.0
      dividend_years_mapping:
        func_type: "linear"
        coefficient: 1.0
        lower_bound: 3
        upper_bound: 10
        max_bonus: 15.0
        max_penalty: 0.0
      earnings_recovery_mapping:
        func_type: "linear"
        coefficient: 1.0
        lower_bound: 0.0
        upper_bound: 1.0
        max_bonus: 15.0
        max_penalty: 0.0
      base_pass_score: 60.0
      base_fail_score: 0.0

  tie_break:
    enabled: true
    factors: ["conservative_ratio", "loose_ratio", "dividend_yield"]
    factor_weights: [0.4, 0.3, 0.3]

# 输出配置
output:
  csv_dir: "output_data/results"
  csv_encoding: "utf-8-sig"
  log_dir: "logs"
  log_level: "INFO"
  terminal_max_rows: 50

# 市场模式: "A"=仅A股, "HK"=仅港股, "ALL"=全市场
market: "A"

# 港股通选股配置
hk_stock:
  data_source:
    primary: "akshare"
    fallback: "eastmoney"
  constituents:
    include_sse: true
    include_szse: true
    max_stocks: 300
  currency:
    unit: "HKD"
    convert_to_cny: false
    fixed_hkd_cny_rate: 0.0
  delisting:
    max_suspend_months: 3
    min_market_cap_hkd: 50000000
    filter_audit_opinion: true
  field_mapping_path: "config/hk_field_mapping.yaml"
